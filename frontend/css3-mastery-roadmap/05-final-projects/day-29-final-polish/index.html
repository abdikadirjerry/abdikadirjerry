<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polished Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title">Dashboard</h1>

      <section class="cards" aria-label="Dashboard Statistics">
        <article class="card" tabindex="0">
          <h2 class="card__title">Users</h2>
          <p class="card__value">1,240</p>
        </article>

        <article class="card" tabindex="0">
          <h2 class="card__title">Sales</h2>
          <p class="card__value">$8,320</p>
        </article>

        <article class="card" tabindex="0">
          <h2 class="card__title">Performance</h2>
          <p class="card__value">87%</p>
        </article>
      </section>
    </main>
  </body>
</html>
