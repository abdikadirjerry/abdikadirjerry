<!doctype html>
<html>
  <head>
    <title>Day 27 Browser Storage</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Browser Storage App</h1>

    <!-- Name Save -->
    <input id="nameInput" placeholder="Enter name" />
    <button id="saveNameBtn">Save Name</button>

    <p id="nameDisplay"></p>

    <!-- Message -->
    <input id="msgInput" placeholder="Temporary message" />
    <button id="saveMsgBtn">Save Message</button>

    <p id="msgDisplay"></p>

    <!-- Todo -->
    <input id="todoInput" placeholder="Add task" />
    <button id="addTodoBtn">Add Task</button>

    <ul id="todoList"></ul>

    <!-- Theme -->
    <button id="themeBtn">Toggle Theme</button>

    <script src="utils.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
